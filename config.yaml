server:
  port: ${GW_PORT}
  readTimeout: 30s
  writeTimeout: 30s
  shutdownTimeout: 10s

redis:
  addr: ${REDIS_ADDR}

jwt:
  enabled: true
  authUrl: ${AUTH_URL}
  jwksPath: /auth/public-keys
  issuer: ${AUTH_URL}
  audience: ${AUDIENCE}
  validMethods:
    - RS256
  revokedTokenPrefix: "token:revoked:"

routes:
  - id: ms-auth
    pathPrefix: /w/auth
    upstream: ${AUTH_URL}
    stripPrefix: 1

rateLimit:
  rate: 100
  window: 1s
  keyPrefix: "ratelimit:"
  keyHeaders:
    - header: X-DEVICE-ID
      prefix: device
    - header: USERNAME
      prefix: user

circuitBreaker:
  maxRequests: 5
  interval: 60s
  timeout: 5s
  failureRatio: 0.5
  windowSize: 100

bypassPaths:
  - /w/auth/
  - "!/w/auth/user-info"
